name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [develop, master]
  push:
    branches: [develop]

jobs:
  # Validate PR titles follow conventional commit format (used as merge commit message on squash merge)
  validate-pr-title:
    if: github.event_name == 'pull_request'
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the type prefix."

  # Validate commit messages on direct pushes to develop
  validate-push-commits:
    if: github.event_name == 'push'
    name: Validate Push Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+$'
          FAILED=0

          for SHA in $(git log --format='%H' ${{ github.event.before }}..${{ github.event.after }}); do
            MSG=$(git log --format='%s' -n 1 "$SHA")

            # Allow merge commits
            if echo "$MSG" | grep -qE '^Merge '; then
              continue
            fi

            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "❌ Invalid commit message: $MSG"
              echo "   Commit: $SHA"
              echo "   Expected format: type(scope): description"
              echo "   Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
              echo ""
              FAILED=1
            else
              echo "✅ $MSG"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "One or more commit messages do not follow the Conventional Commits format."
            echo "See: https://www.conventionalcommits.org/"
            exit 1
          fi
